name: Deploy Hexo Site

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Setup butterfly theme
        run: |
          cp node_modules/hexo-theme-butterfly/package.json themes/butterfly/ 2>/dev/null || true
          for dir in languages layout scripts source data; do
            if [ -d "themes/butterfly/$dir" ]; then
              rm -rf "themes/butterfly/$dir"
            fi
            cp -r "node_modules/hexo-theme-butterfly/$dir" "themes/butterfly/" 2>/dev/null || true
          done

      - name: Generate site
        run: npx hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public